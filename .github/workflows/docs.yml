name: Documentation
on:
  push:
    branches:
      - master
      - main
    paths:
      - "docs/**"
      - "docs-archive/**"
      - "zensical.toml"
      - "zensical.fr.toml"
      - "scripts/docs-build-versioned.mjs"
      - ".github/workflows/docs.yml"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pip install zensical==0.0.43
      # Build every documented version (en + fr) into site/<version>/ with a
      # versions.json + root redirect. See scripts/docs-build-versioned.mjs.
      - run: node scripts/docs-build-versioned.mjs
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - uses: actions/deploy-pages@v5
        id: deployment
